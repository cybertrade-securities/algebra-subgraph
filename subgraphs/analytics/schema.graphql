type Token @entity(immutable: false) {
  id: ID!
  symbol: String!
  name: String!
  decimals: BigInt!
}

type Pool @entity(immutable: false) {
  id: ID!
  createdAtBlockNumber: BigInt!
  token0: Token!
  token1: Token!
  deployer: Bytes!
  plugin: Bytes!
  pluginConfig: Int!
  fee: BigInt!
  communityFee: BigInt!
  tickSpacing: BigInt!
}
