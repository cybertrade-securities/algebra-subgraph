specVersion: 0.0.4
description: Algebra is a decentralized protocol for automated token exchange on {{NETWORK_NAME}}.
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum/contract
    name: Factory
    network: {{NETWORK}}
    source:
      address: '{{FACTORY_ADDRESS}}'
      abi: Factory
      startBlock: {{START_BLOCK}}
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      file: ./src/mappings/factory.ts
      entities:
        - Pool
        - Token
      abis:
        - name: Factory
          file: ../../abis/factory.json
        - name: ERC20
          file: ../../abis/ERC20.json
        - name: ERC20SymbolBytes
          file: ../../abis/ERC20SymbolBytes.json
        - name: ERC20NameBytes
          file: ../../abis/ERC20NameBytes.json
      eventHandlers:
        - event: Pool(indexed address,indexed address,address)
          handler: handlePoolCreated
        - event: CustomPool(indexed address,indexed address,indexed address,address)
          handler: handleCustomPoolCreated
templates:
  - kind: ethereum/contract
    name: Pool
    network: {{NETWORK}}
    source:
      abi: Pool
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.6
      language: wasm/assemblyscript
      file: ./src/mappings/core.ts
      entities:
        - Pool
        - Token
      abis:
        - name: Pool
          file: ../../abis/pool.json
      eventHandlers:
        - event: Fee(uint16)
          handler: handleChangeFee
        - event: CommunityFee(uint16)
          handler: handleSetCommunityFee
        - event: TickSpacing(int24)
          handler: handleSetTickSpacing
        - event: Plugin(address)
          handler: handlePlugin
        - event: PluginConfig(uint8)
          handler: handlePluginConfig
